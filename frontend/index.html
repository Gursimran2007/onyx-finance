<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onyx — Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav>
    <span class="logo">Onyx</span>
    <a href="/" class="active">Dashboard</a>
    <a href="/add">Add</a>
    <a href="/import">Import</a>
    <a href="/portfolio">Portfolio</a>
    <a href="/news">News</a>
    <a href="/goals">Goals</a>
    <a href="/chat">AI Chat</a>
    <a href="#" onclick="logout()" style="margin-left:auto" id="userLabel"></a>
</nav>
<main>
    <div class="page-header">
        <h1>Overview</h1>
        <p id="dateLabel"></p>
    </div>
    <div class="cards">
        <div class="card income">
            <div class="card-icon">↑</div>
            <div class="label">Total Income</div>
            <div class="value" id="totalIncome">₹0</div>
            <div class="sub">All time</div>
        </div>
        <div class="card expense">
            <div class="card-icon">↓</div>
            <div class="label">Total Expenses</div>
            <div class="value" id="totalExpenses">₹0</div>
            <div class="sub">All time</div>
        </div>
        <div class="card balance">
            <div class="card-icon">◈</div>
            <div class="label">Balance</div>
            <div class="value" id="balance">₹0</div>
            <div class="sub">Net position</div>
        </div>
    </div>
    <div class="charts-row">
        <div class="chart-card">
            <h3>Spending by Category</h3>
            <div class="chart-wrap" style="max-height:200px;display:flex;justify-content:center">
                <canvas id="donutChart"></canvas>
            </div>
            <div class="legend" id="chartLegend"></div>
        </div>
        <div class="chart-card">
            <h3>Spending Trend</h3>
            <div class="chart-wrap">
                <canvas id="lineChart" height="200"></canvas>
            </div>
        </div>
    </div>
    <div class="section-header">
        <h3>Recent Transactions</h3>
        <a href="/add">+ Add new</a>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th></th>
                </tr>
            </thead>
            <tbody id="txnBody">
                <tr><td colspan="6"><div class="empty"><div class="empty-icon">◈</div><p>Loading...</p></div></td></tr>
            </tbody>
        </table>
    </div>
</main>
<script src="/app.js"></script>
<script>
    requireAuth();
    document.getElementById('userLabel').textContent = (localStorage.getItem('onyx_name') || 'Account') + ' ↗';
    document.getElementById('dateLabel').textContent =
        new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    loadDashboard();
</script>
</body>
</html>
