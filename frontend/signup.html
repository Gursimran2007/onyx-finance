<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Onyx — Sign Up</title>
    <link rel="stylesheet" href="/style.css"/>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .auth-wrap { width:100%; max-width:400px; padding:2rem; }
        .auth-logo { text-align:center; margin-bottom:2.5rem; }
        .auth-logo .logo { font-size:2rem; }
        .auth-logo p { color:var(--text-muted); font-size:0.85rem; margin-top:0.5rem; }
        .auth-footer { text-align:center; margin-top:1.2rem; font-size:0.83rem; color:var(--text-muted); }
        .auth-footer a { color:var(--text-secondary); text-decoration:none; }
        .auth-footer a:hover { color:var(--text-primary); }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-logo">
        <div class="logo">Onyx</div>
        <p>Create your free account</p>
    </div>
    <div class="form-card">
        <div id="alertBox" class="alert"></div>
        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Gursimran Singh" required/>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required/>
            </div>
            <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
        </form>
    </div>
    <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
    if (localStorage.getItem('onyx_token')) window.location.href = '/';
    document.getElementById('signupForm').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('signupBtn');
        btn.disabled = true; btn.textContent = 'Creating account...';
        const alertEl = document.getElementById('alertBox');
        alertEl.style.display = 'none';
        try {
            const res = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name:     document.getElementById('name').value,
                    email:    document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (!res.ok || data.error) throw new Error(data.error || 'Signup failed');
            localStorage.setItem('onyx_token', data.token);
            localStorage.setItem('onyx_name',  data.name);
            window.location.href = '/';
        } catch(err) {
            alertEl.className = 'alert error';
            alertEl.textContent = err.message;
            alertEl.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Create Account';
        }
    });
</script>
</body>
</html>
