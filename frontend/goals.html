<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Onyx — Goals</title>
    <link rel="stylesheet" href="/style.css"/>
    <style>
        .goals-layout { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
        .goal-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:1.4rem; transition:border-color 0.2s; }
        .goal-card:hover { border-color:var(--border-mid); }
        .goal-name { font-size:1rem; font-weight:600; color:var(--text-primary); margin-bottom:0.3rem; }
        .goal-target { font-size:0.78rem; color:var(--text-muted); margin-bottom:1rem; }
        .progress-bar-wrap { background:var(--bg-base); border-radius:20px; height:6px; margin-bottom:0.6rem; overflow:hidden; }
        .progress-bar { height:100%; border-radius:20px; background:var(--text-primary); transition:width 0.8s ease; }
        .goal-progress-row { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:1rem; }
        .goal-saved { color:var(--income); font-family:'JetBrains Mono',monospace; }
        .goal-pct { color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
        .goal-actions { display:flex; gap:0.5rem; }
        .btn-update { flex:1; padding:0.5rem; background:var(--bg-base); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); font-size:0.78rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .btn-update:hover { border-color:var(--border-bright); color:var(--text-primary); }
        .goal-date { font-size:0.72rem; color:var(--text-muted); margin-top:0.8rem; font-family:'JetBrains Mono',monospace; }
        .completed .progress-bar { background:var(--income); }
        .completed .goal-name::after { content:' ✓'; color:var(--income); }
        .goals-list { display:flex; flex-direction:column; gap:1rem; }
        .update-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
        .update-modal.open { display:flex; }
        .modal-box { background:var(--bg-card); border:1px solid var(--border-mid); border-radius:16px; padding:1.5rem; width:320px; }
        .modal-box h3 { font-size:1rem; margin-bottom:1.2rem; }
        .modal-actions { display:flex; gap:0.5rem; margin-top:1rem; }
        .btn-cancel { flex:1; padding:0.7rem; background:var(--bg-base); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); cursor:pointer; font-family:'Inter',sans-serif; }
    </style>
</head>
<body>
<nav>
    <span class="logo">Onyx</span>
    <a href="/">Dashboard</a>
    <a href="/add">Add</a>
    <a href="/import">Import</a>
    <a href="/portfolio">Portfolio</a>
    <a href="/news">News</a>
    <a href="/goals" class="active">Goals</a>
    <a href="/chat">AI Chat</a>
    <a href="#" onclick="logout()" style="margin-left:auto" id="userLabel"></a>
</nav>
<main>
    <div class="page-header">
        <h1>Savings Goals</h1>
        <p>Set targets and track your progress</p>
    </div>
    <div class="goals-layout">
        <div>
            <div class="section-header"><h3>Your Goals</h3></div>
            <div class="goals-list" id="goalsList">
                <div class="empty"><div class="empty-icon">◎</div><p>No goals yet. Add one →</p></div>
            </div>
        </div>
        <div>
            <div class="section-header"><h3>New Goal</h3></div>
            <div class="form-card">
                <div id="goalAlert" class="alert"></div>
                <div class="form-group">
                    <label>Goal Name</label>
                    <input id="goalName" placeholder="e.g. New iPhone, Europe Trip, Emergency Fund"/>
                </div>
                <div class="form-group">
                    <label>Target Amount (₹)</label>
                    <input id="goalTarget" type="number" placeholder="100000"/>
                </div>
                <div class="form-group">
                    <label>Target Date</label>
                    <input id="goalDate" type="date"/>
                </div>
                <button class="btn-primary" onclick="addGoal()">Create Goal</button>
            </div>
        </div>
    </div>
</main>

<!-- Update Modal -->
<div class="update-modal" id="updateModal">
    <div class="modal-box">
        <h3>Update Saved Amount</h3>
        <div class="form-group">
            <label>Amount Saved So Far (₹)</label>
            <input id="modalSaved" type="number" placeholder="0"/>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" style="flex:1;margin-top:0" onclick="saveUpdate()">Update</button>
        </div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    requireAuth();
    document.getElementById('userLabel').textContent = (localStorage.getItem('onyx_name') || 'Account') + ' ↗';

    let editingGoalId = null;

    function fmt(n) { return '₹' + Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0}); }
    function daysLeft(dateStr) {
        if (!dateStr) return '';
        const diff = Math.ceil((new Date(dateStr) - Date.now()) / 86400000);
        if (diff < 0)  return 'Overdue';
        if (diff === 0) return 'Today!';
        return diff + ' days left';
    }

    async function loadGoals() {
        try {
            const res   = await fetch('/api/goals', { headers: authHeaders() });
            const goals = await res.json();
            const el    = document.getElementById('goalsList');
            if (!goals.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">◎</div><p>No goals yet. Add one →</p></div>'; return; }
            el.innerHTML = goals.map(g => {
                const pct  = Math.min(100, Math.round((g.savedAmount / g.targetAmount) * 100)) || 0;
                const done = pct >= 100;
                return `
                <div class="goal-card ${done ? 'completed' : ''} fade-in">
                    <div class="goal-name">${g.name}</div>
                    <div class="goal-target">Target: ${fmt(g.targetAmount)}</div>
                    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
                    <div class="goal-progress-row">
                        <span class="goal-saved">${fmt(g.savedAmount)} saved</span>
                        <span class="goal-pct">${pct}%</span>
                    </div>
                    <div class="goal-actions">
                        <button class="btn-update" onclick="openModal(${g.id}, ${g.savedAmount})">Update Progress</button>
                        <button class="btn-del" onclick="deleteGoal(${g.id})" style="flex-shrink:0">✕</button>
                    </div>
                    ${g.targetDate ? `<div class="goal-date">🗓 ${g.targetDate} · ${daysLeft(g.targetDate)}</div>` : ''}
                </div>`;
            }).join('');
        } catch(e) { console.error(e); }
    }

    async function addGoal() {
        const name   = document.getElementById('goalName').value.trim();
        const target = parseFloat(document.getElementById('goalTarget').value);
        const date   = document.getElementById('goalDate').value;
        const alertEl = document.getElementById('goalAlert');
        if (!name || !target) { alertEl.className='alert error'; alertEl.textContent='Name and target amount required.'; alertEl.style.display='block'; return; }
        await fetch('/api/goals', { method:'POST', headers: authHeaders(), body: JSON.stringify({name, targetAmount:target, targetDate:date}) });
        document.getElementById('goalName').value = '';
        document.getElementById('goalTarget').value = '';
        document.getElementById('goalDate').value = '';
        alertEl.className='alert success'; alertEl.textContent='Goal created!'; alertEl.style.display='block';
        setTimeout(() => alertEl.style.display='none', 2000);
        loadGoals();
    }

    function openModal(id, current) { editingGoalId = id; document.getElementById('modalSaved').value = current; document.getElementById('updateModal').classList.add('open'); }
    function closeModal() { document.getElementById('updateModal').classList.remove('open'); editingGoalId = null; }
    async function saveUpdate() {
        const saved = parseFloat(document.getElementById('modalSaved').value);
        if (isNaN(saved)) return;
        await fetch(`/api/goals/${editingGoalId}`, { method:'PATCH', headers: authHeaders(), body: JSON.stringify({saved}) });
        closeModal(); loadGoals();
    }
    async function deleteGoal(id) {
        if (!confirm('Delete this goal?')) return;
        await fetch(`/api/goals/${id}`, { method:'DELETE', headers: authHeaders() });
        loadGoals();
    }

    loadGoals();
</script>
</body>
</html>
