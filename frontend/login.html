<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Onyx — Login</title>
    <link rel="stylesheet" href="/style.css"/>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .auth-wrap { width:100%; max-width:400px; padding:2rem; }
        .auth-logo { text-align:center; margin-bottom:2.5rem; }
        .auth-logo .logo { font-size:2rem; }
        .auth-logo p { color:var(--text-muted); font-size:0.85rem; margin-top:0.5rem; }
        .divider-text { text-align:center; color:var(--text-muted); font-size:0.78rem; margin:1.2rem 0; position:relative; }
        .divider-text::before, .divider-text::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
        .divider-text::before { left:0; }
        .divider-text::after  { right:0; }
        .auth-footer { text-align:center; margin-top:1.2rem; font-size:0.83rem; color:var(--text-muted); }
        .auth-footer a { color:var(--text-secondary); text-decoration:none; }
        .auth-footer a:hover { color:var(--text-primary); }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-logo">
        <div class="logo">Onyx</div>
        <p>Your personal finance command centre</p>
    </div>
    <div class="form-card">
        <div id="alertBox" class="alert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
        </form>
    </div>
    <div class="auth-footer">
        Don't have an account? <a href="/signup">Sign up free</a>
    </div>
</div>
<script>
    if (localStorage.getItem('onyx_token')) window.location.href = '/';

    document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.textContent = 'Signing in...';
        const alertEl = document.getElementById('alertBox');
        alertEl.style.display = 'none';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (!res.ok || data.error) throw new Error(data.error || 'Login failed');
            localStorage.setItem('onyx_token', data.token);
            localStorage.setItem('onyx_name',  data.name);
            window.location.href = '/';
        } catch(err) {
            alertEl.className = 'alert error';
            alertEl.textContent = err.message;
            alertEl.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
