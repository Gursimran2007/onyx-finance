<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Onyx — News & Tax</title>
    <link rel="stylesheet" href="/style.css"/>
    <style>
        .news-grid { display:grid; grid-template-columns:2fr 1fr; gap:1.5rem; }
        .news-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:1.2rem 1.4rem; transition:border-color 0.2s,transform 0.2s; cursor:pointer; text-decoration:none; display:block; }
        .news-card:hover { border-color:var(--border-mid); transform:translateY(-2px); }
        .news-source { font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.5rem; }
        .news-title { font-size:0.92rem; font-weight:600; color:var(--text-primary); line-height:1.45; margin-bottom:0.5rem; }
        .news-desc { font-size:0.8rem; color:var(--text-secondary); line-height:1.5; }
        .news-time { font-size:0.72rem; color:var(--text-muted); margin-top:0.6rem; font-family:'JetBrains Mono',monospace; }
        .news-list { display:flex; flex-direction:column; gap:0.8rem; }
        .tax-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:1rem 1.2rem; display:flex; gap:1rem; align-items:flex-start; }
        .tax-card.urgent { border-color:rgba(248,113,113,0.3); background:rgba(248,113,113,0.04); }
        .tax-date { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--text-muted); white-space:nowrap; padding-top:0.1rem; }
        .tax-title { font-size:0.88rem; font-weight:600; color:var(--text-primary); }
        .tax-desc { font-size:0.78rem; color:var(--text-muted); margin-top:0.25rem; line-height:1.5; }
        .urgent-badge { display:inline-block; padding:0.15rem 0.5rem; background:rgba(248,113,113,0.1); color:var(--expense); border:1px solid rgba(248,113,113,0.25); border-radius:4px; font-size:0.65rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-left:0.5rem; }
        .skeleton { background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-hover) 50%,var(--bg-card) 75%); background-size:200% 100%; animation:skeleton-shine 1.5s infinite; border-radius:8px; height:120px; }
        @keyframes skeleton-shine { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body>
<nav>
    <span class="logo">Onyx</span>
    <a href="/">Dashboard</a>
    <a href="/add">Add</a>
    <a href="/import">Import</a>
    <a href="/portfolio">Portfolio</a>
    <a href="/news" class="active">News</a>
    <a href="/goals">Goals</a>
    <a href="/chat">AI Chat</a>
    <a href="#" onclick="logout()" style="margin-left:auto" id="userLabel"></a>
</nav>
<main>
    <div class="page-header">
        <h1>News & Tax Alerts</h1>
        <p>Indian finance news and upcoming tax deadlines</p>
    </div>
    <div class="news-grid">
        <div>
            <div class="section-header"><h3>Finance News</h3></div>
            <div class="news-list" id="newsList">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </div>
        <div>
            <div class="section-header"><h3>Tax & Compliance Deadlines</h3></div>
            <div class="news-list" id="taxList">
                <div class="skeleton" style="height:80px"></div>
                <div class="skeleton" style="height:80px"></div>
            </div>
        </div>
    </div>
</main>
<script src="/app.js"></script>
<script>
    requireAuth();
    document.getElementById('userLabel').textContent = (localStorage.getItem('onyx_name') || 'Account') + ' ↗';

    function timeAgo(iso) {
        if (!iso) return '';
        const diff = (Date.now() - new Date(iso)) / 1000;
        if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        return Math.floor(diff/86400) + 'd ago';
    }

    async function loadNews() {
        try {
            const res  = await fetch('/api/news');
            const data = await res.json();
            const list = document.getElementById('newsList');
            if (!data.length) { list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;padding:1rem">No news available. Set NEWS_API_KEY for live feed.</p>'; return; }
            list.innerHTML = data.map(n => `
                <a class="news-card fade-in" href="${n.url || '#'}" target="_blank" rel="noopener">
                    <div class="news-source">${n.source || 'Business News'} · ${timeAgo(n.publishedAt)}</div>
                    <div class="news-title">${n.title}</div>
                    <div class="news-desc">${n.description || ''}</div>
                </a>`).join('');
        } catch { document.getElementById('newsList').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;padding:1rem">Could not load news.</p>'; }
    }

    async function loadTax() {
        try {
            const res  = await fetch('/api/tax/reminders');
            const data = await res.json();
            document.getElementById('taxList').innerHTML = data.map(t => `
                <div class="tax-card ${t.urgent ? 'urgent' : ''} fade-in">
                    <div class="tax-date">${t.date}</div>
                    <div>
                        <div class="tax-title">${t.title}${t.urgent ? '<span class="urgent-badge">Due Soon</span>' : ''}</div>
                        <div class="tax-desc">${t.description}</div>
                    </div>
                </div>`).join('');
        } catch {}
    }

    loadNews();
    loadTax();
</script>
</body>
</html>
